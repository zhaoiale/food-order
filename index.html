<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美食点餐系统</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<header class="header">
  <div class="logo">
    <i class="bi bi-egg-fried"></i>
    <h1>美食点餐系统</h1>
  </div>
</header>

<main class="main-container">
  <section class="food-section">
    <h2>菜品选择</h2>
    <div class="category-tabs">
      <button class="tab-btn active" data-category="all">全部</button>
      <button class="tab-btn" data-category="staple">主食</button>
      <button class="tab-btn" data-category="drink">饮品</button>
      <button class="tab-btn" data-category="snack">小吃</button>
    </div>
    <div class="food-list"></div>
  </section>

  <section class="order-section">
    <h2>我的订单</h2>
    <div class="order-card">
      <div class="table-select">
        <label for="tableNum">桌号：</label>
        <select id="tableNum">
          <option value="1">1号桌</option>
          <option value="2">2号桌</option>
          <option value="3">3号桌</option>
          <option value="4">4号桌</option>
          <option value="5">5号桌</option>
        </select>
      </div>
      <div class="order-list" id="orderList">
        <div class="empty-tip">
          <i class="bi bi-cart-x"></i>
          <p>暂无选中菜品</p>
        </div>
      </div>
      <div class="order-summary">
        <p>总计：<span class="total-price">¥0.00</span></p>
        <div class="order-btn-group">
          <button class="clear-btn"><i class="bi bi-trash"></i> 清空订单</button>
          <button class="submit-btn"><i class="bi bi-check2-circle"></i> 提交订单</button>
        </div>
      </div>
    </div>
  </section>
</main>

<footer class="footer">
  <p>© 2025 美食点餐系统 版权所有</p>
</footer>

<div class="modal" id="foodDetailModal">
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <div class="modal-body">
      <div class="detail-img">
        <img src="" alt="" id="detailFoodImg">
      </div>
      <div class="detail-info">
        <h3 id="detailFoodName"></h3>
        <div class="detail-rating">
          <span class="stars" id="detailFoodStars"></span>
          <span class="sales" id="detailFoodSales"></span>
        </div>
        <p class="detail-desc" id="detailFoodDesc"></p>
        <div class="detail-price" id="detailFoodPrice"></div>
        <div class="detail-stock" id="detailFoodStock"></div>
        <div class="detail-control">
          <button class="btn-add-cart">加入购物车</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="submitModal">
  <div class="modal-content submit-modal-content">
    <span class="close-modal">&times;</span>
    <div class="modal-body">
      <h3>确认下单</h3>
      <div class="submit-info">
        <p><span>桌号：</span><span id="submitTableNum">1号桌</span></p>
        <div class="submit-order-list" id="submitOrderList"></div>
        <p class="submit-total"><span>总计：</span><span id="submitTotalPrice">¥0.00</span></p>
      </div>
      <div class="contact-info">
        <label for="contactPhone">联系电话（选填）：</label>
        <input type="tel" id="contactPhone" placeholder="请输入联系电话">
      </div>
      <button class="confirm-submit-btn">确认下单</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<script type="module" src="assets/js/app.js"></script>
</body>
</html>
